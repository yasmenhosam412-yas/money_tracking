name: imrpo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  bloc: ^9.2.1
  dartz: ^0.10.1
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  crypto: ^3.0.6
  supabase_flutter: ^2.12.4
  permission_handler: ^12.0.1
  flutter_sms_inbox: ^1.0.4
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^8.1.0
  skeletonizer: ^2.1.3
  file_picker: ^11.0.2
  csv: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/wallet.png

flutter_native_splash:
  image: assets/wallet.png
  color: "#F7F3EF"

arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/wallet.png"
  min_sdk_android: 21